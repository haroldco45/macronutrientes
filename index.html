<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSport Pro | Entrenamiento Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <main class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-500 italic uppercase tracking-tighter">Nutri<span class="text-white">Sport</span> Pro</h1>
            <p class="text-gray-400 text-sm">Pesas • Barras • Bandas • Nutrición</p>
        </header>

        <section class="bg-gray-800 p-6 rounded-3xl border border-gray-700 shadow-2xl mb-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="number" id="peso" placeholder="Peso (kg)" class="bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-emerald-500 transition">
                <select id="objetivo" class="bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none">
                    <option value="perder">Definición</option>
                    <option value="mantener">Mantenimiento</option>
                    <option value="ganar">Volumen (Músculo)</option>
                </select>
            </div>

            <p class="text-center text-xs font-bold text-gray-500 uppercase mb-4">Selecciona Intensidad de Hoy</p>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="generarRutina(1)" class="lvl-btn p-4 bg-gray-900 rounded-2xl border-2 border-transparent hover:border-blue-500 transition">
                    <i class="fas fa-bolt text-blue-400 mb-1"></i><br><span class="text-[10px] font-black">SUAVE</span>
                </button>
                <button onclick="generarRutina(2)" class="lvl-btn p-4 bg-gray-900 rounded-2xl border-2 border-transparent hover:border-yellow-500 transition">
                    <i class="fas fa-fire text-yellow-500 mb-1"></i><br><span class="text-[10px] font-black">MEDIO</span>
                </button>
                <button onclick="generarRutina(3)" class="lvl-btn p-4 bg-gray-900 rounded-2xl border-2 border-transparent hover:border-red-600 transition">
                    <i class="fas fa-dumbbell text-red-600 mb-1"></i><br><span class="text-[10px] font-black">BESTIA</span>
                </button>
            </div>
        </section>

        <div id="macros-ui" class="hidden mb-8 animate-fade-in">
            <div class="flex justify-between items-center bg-emerald-900/20 p-4 rounded-2xl border border-emerald-500/30">
                <div><p class="text-[10px] text-emerald-500 font-bold">PROT</p><p id="p-val" class="text-xl font-black">--</p></div>
                <div><p class="text-[10px] text-emerald-500 font-bold">CARB</p><p id="c-val" class="text-xl font-black">--</p></div>
                <div><p class="text-[10px] text-emerald-500 font-bold">GRAS</p><p id="g-val" class="text-xl font-black">--</p></div>
                <div class="text-right border-l border-emerald-500/30 pl-4">
                    <p class="text-[10px] text-emerald-500 font-bold">CALORÍAS</p>
                    <p id="kcal-val" class="text-xl font-black text-emerald-400">--</p>
                </div>
            </div>
        </div>

        <div id="rutina-ui" class="hidden space-y-4">
            <h3 class="text-lg font-black uppercase tracking-widest text-gray-500">Plan de Trabajo</h3>
            <div id="contenedor-ejercicios" class="space-y-3">
                </div>
        </div>
    </main>

    <script>
        const dbEjercicios = {
            pesas: [
                { n: "Press de Banca", d: "4 series x 10 reps", t: "Pesas", i: "fa-dumbbell" },
                { n: "Sentadilla con Barra", d: "4 series x 12 reps", t: "Pesas", i: "fa-dumbbell" },
                { n: "Peso Muerto", d: "3 series x 8 reps", t: "Pesas", i: "fa-dumbbell" }
            ],
            barras: [
                { n: "Dominadas (Pull-ups)", d: "Al fallo técnico", t: "Barras", i: "fa-bars" },
                { n: "Fondos en Paralelas", d: "3 series x 15 reps", t: "Barras", i: "fa-bars" },
                { n: "Muscle Ups", d: "3 series x 5 reps", t: "Barras", i: "fa-bars" }
            ],
            bandas: [
                { n: "Facepull con Banda", d: "4 series x 20 reps", t: "Bandas", i: "fa-infinity" },
                { n: "Pasos Laterales", d: "3 series x 15m", t: "Bandas", i: "fa-infinity" },
                { n: "Bíceps con Resistencia", d: "3 series x 20 reps", t: "Bandas", i: "fa-infinity" }
            ]
        };

        function generarRutina(nivel) {
            const peso = parseFloat(document.getElementById('peso').value);
            if (!peso) return alert("Indica tu peso para ajustar la potencia");

            // Lógica Nutricional
            let mult = nivel === 1 ? 2.5 : (nivel === 2 ? 3.5 : 5);
            let p = peso * 2;
            let c = peso * mult;
            let g = peso * 0.9;
            let kcal = (p * 4) + (c * 4) + (g * 9);

            document.getElementById('p-val').innerText = Math.round(p) + "g";
            document.getElementById('c-val').innerText = Math.round(c) + "g";
            document.getElementById('g-val').innerText = Math.round(g) + "g";
            document.getElementById('kcal-val').innerText = Math.round(kcal);
            document.getElementById('macros-ui').classList.remove('hidden');

            // Lógica de Ejercicios (Mezcla de todo)
            const contenedor = document.getElementById('contenedor-ejercicios');
            contenedor.innerHTML = "";
            
            // Mezclamos un poco de cada categoría según el nivel
            const miSeleccion = [
                ...dbEjercicios.pesas.slice(0, nivel),
                ...dbEjercicios.barras.slice(0, nivel),
                ...dbEjercicios.bandas.slice(0, nivel)
            ];

            miSeleccion.forEach(ex => {
                contenedor.innerHTML += `
                    <div class="bg-gray-800 p-5 rounded-2xl border-l-4 border-emerald-500 flex justify-between items-center group hover:bg-gray-750 transition">
                        <div class="flex items-center gap-4">
                            <div class="bg-gray-900 p-3 rounded-xl text-emerald-500 group-hover:scale-110 transition">
                                <i class="fas ${ex.i}"></i>
                            </div>
                            <div>
                                <h4 class="font-black text-white uppercase text-sm">${ex.n}</h4>
                                <p class="text-xs text-emerald-500 font-bold">${ex.t}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-bold text-gray-400 bg-gray-900 px-3 py-1 rounded-full border border-gray-700">${ex.d}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('rutina-ui').classList.remove('hidden');
        }
    </script>
</body>
</html>
