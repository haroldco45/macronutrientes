<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSport | Configuración de Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <main class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-emerald-500">Configura tu Perfil</h1>
            <p class="text-gray-400">Introduce tus medidas para personalizar tu plan nutricional.</p>
        </header>

        <section class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Peso (kg)</label>
                    <input type="number" id="peso" placeholder="70" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Altura (cm)</label>
                    <input type="number" id="altura" placeholder="175" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Edad</label>
                    <input type="number" id="edad" placeholder="25" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Objetivo</label>
                    <select id="objetivo" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="perder">Perder Grasa</option>
                        <option value="mantener">Mantener Peso</option>
                        <option value="ganar">Ganar Músculo</option>
                    </select>
                </div>
            </div>
            <button onclick="calcularPlan()" class="w-full mt-8 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition shadow-lg">
                Actualizar mi Plan
            </button>
        </section>

        <div id="resultados" class="hidden animate-fade-in">
            <h2 class="text-xl font-bold mb-4 text-center">Tu Objetivo Diario</h2>
            <div class="grid grid-cols-3 gap-4 mb-6 text-center">
                <div class="bg-blue-900/30 p-4 rounded-xl border border-blue-500/50">
                    <p class="text-xs text-blue-300">PROTEÍNA</p>
                    <p id="res-prot" class="text-xl font-bold">--</p>
                </div>
                <div class="bg-yellow-900/30 p-4 rounded-xl border border-yellow-500/50">
                    <p class="text-xs text-yellow-300">CARBOS</p>
                    <p id="res-carb" class="text-xl font-bold">--</p>
                </div>
                <div class="bg-red-900/30 p-4 rounded-xl border border-red-500/50">
                    <p class="text-xs text-red-300">GRASAS</p>
                    <p id="res-gras" class="text-xl font-bold">--</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calcularPlan() {
            const peso = parseFloat(document.getElementById('peso').value);
            const objetivo = document.getElementById('objetivo').value;
            
            if (!peso) return alert("Por favor, introduce tu peso.");

            // Lógica simple de macros (clon de algoritmo básico)
            let prot = peso * 2; // 2g por kilo
            let gras = peso * 0.8; // 0.8g por kilo
            let carb = objetivo === 'ganar' ? peso * 4 : (objetivo === 'perder' ? peso * 2 : peso * 3);

            document.getElementById('res-prot').innerText = Math.round(prot) + "g";
            document.getElementById('res-carb').innerText = Math.round(carb) + "g";
            document.getElementById('res-gras').innerText = Math.round(gras) + "g";
            
            document.getElementById('resultados').classList.remove('hidden');
        }
    </script>
</body>
</html>
