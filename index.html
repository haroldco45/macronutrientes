<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSport Pro | Entrenador Ilimitado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <main class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-500 italic">NUTRI<span class="text-white">SPORT</span></h1>
            <p class="text-gray-400 mt-2">Nutrición & Rutinas Inteligentes</p>
        </header>

        <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-6">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="peso" placeholder="Peso (kg)" class="bg-gray-900 border border-gray-600 rounded-lg p-3 outline-none">
                <select id="objetivo" class="bg-gray-900 border border-gray-600 rounded-lg p-3 outline-none">
                    <option value="perder">Quemar Grasa</option>
                    <option value="mantener">Mantenerse</option>
                    <option value="ganar">Ganar Músculo</option>
                </select>
            </div>
            <div class="grid grid-cols-3 gap-3 mt-6">
                <button onclick="generarTodo(1)" class="level-btn p-3 bg-gray-900 border-2 border-transparent rounded-xl hover:border-blue-500 transition">
                    <i class="fas fa-leaf text-blue-400"></i><br><span class="text-[10px]">BAJO</span>
                </button>
                <button onclick="generarTodo(2)" class="level-btn p-3 bg-gray-900 border-2 border-transparent rounded-xl hover:border-yellow-500 transition">
                    <i class="fas fa-bolt text-yellow-400"></i><br><span class="text-[10px]">MEDIO</span>
                </button>
                <button onclick="generarTodo(3)" class="level-btn p-3 bg-gray-900 border-2 border-transparent rounded-xl hover:border-red-500 transition">
                    <i class="fas fa-fire text-red-500"></i><br><span class="text-[10px]">ALTO</span>
                </button>
            </div>
        </section>

        <div id="seccion-macros" class="hidden grid grid-cols-3 gap-4 mb-6 text-center">
            <div class="bg-gray-800 p-3 rounded-xl border-b-2 border-blue-500"><p class="text-xs text-gray-400">Prot</p><p id="res-prot" class="font-bold">--</p></div>
            <div class="bg-gray-800 p-3 rounded-xl border-b-2 border-yellow-500"><p class="text-xs text-gray-400">Carb</p><p id="res-carb" class="font-bold">--</p></div>
            <div class="bg-gray-800 p-3 rounded-xl border-b-2 border-red-500"><p class="text-xs text-gray-400">Gras</p><p id="res-gras" class="font-bold">--</p></div>
        </div>

        <section id="seccion-ejercicios" class="hidden">
            <h3 class="text-lg font-bold mb-4 flex justify-between items-center">
                <span>Rutina Recomendada</span>
                <span id="tiempo-total" class="text-sm bg-emerald-600 px-2 py-1 rounded text-white italic">0 min</span>
            </h3>
            <div id="lista-ejercicios" class="space-y-3">
                </div>
        </section>
    </main>

    <script>
        const baseEjercicios = {
            1: [ // Nivel Bajo
                { nombre: "Caminata Activa", tiempo: "30 min", freq: "Diario", obs: "Ritmo constante" },
                { nombre: "Movilidad Articular", tiempo: "10 min", freq: "3 veces/sem", obs: "Foco en cadera y hombros" },
                { nombre: "Estiramientos Globales", tiempo: "15 min", freq: "Diario", obs: "Al final del día" }
            ],
            2: [ // Nivel Medio
                { nombre: "Trote Suave / Jogging", tiempo: "40 min", freq: "3-4 veces/sem", obs: "Zona 2 de pulso" },
                { nombre: "Circuito Calistenia", tiempo: "30 min", freq: "3 veces/sem", obs: "Sentadillas, flexiones y plancha" },
                { nombre: "HIIT Iniciación", tiempo: "15 min", freq: "2 veces/sem", obs: "30s activo / 30s descanso" }
            ],
            3: [ // Nivel Alto
                { nombre: "Entrenamiento Fuerza", tiempo: "60 min", freq: "5 veces/sem", obs: "Cargas pesadas (RPE 8-9)" },
                { nombre: "Series de Sprint", tiempo: "25 min", freq: "2 veces/sem", obs: "Máxima intensidad" },
                { nombre: "Acondicionamiento Metcon", tiempo: "45 min", freq: "3 veces/sem", obs: "Mínimo descanso entre bloques" }
            ]
        };

        function generarTodo(nivel) {
            const peso = parseFloat(document.getElementById('peso').value);
            if (!peso) return alert("Ingresa tu peso primero");

            // 1. Calcular Nutrición
            let ajuste = nivel === 1 ? 0.8 : (nivel === 3 ? 1.4 : 1);
            document.getElementById('res-prot').innerText = Math.round(peso * 2) + "g";
            document.getElementById('res-carb').innerText = Math.round(peso * 2.5 * ajuste) + "g";
            document.getElementById('res-gras').innerText = Math.round(peso * 0.8) + "g";
            document.getElementById('seccion-macros').classList.remove('hidden');

            // 2. Generar Ejercicios
            const lista = document.getElementById('lista-ejercicios');
            lista.innerHTML = ""; // Limpiar
            let tiempoAcumulado = 0;

            baseEjercicios[nivel].forEach(ex => {
                tiempoAcumulado += parseInt(ex.tiempo);
                lista.innerHTML += `
                    <div class="bg-gray-800 p-4 rounded-xl border-l-4 border-emerald-500 flex justify-between items-center shadow-md">
                        <div>
                            <h4 class="font-bold text-emerald-400">${ex.nombre}</h4>
                            <p class="text-xs text-gray-400">${ex.freq} | ${ex.obs}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-black">${ex.tiempo}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('tiempo-total').innerText = "Carga: " + tiempoAcumulado + " min/sesión aprox.";
            document.getElementById('seccion-ejercicios').classList.remove('hidden');
        }
    </script>
</body>
</html>
