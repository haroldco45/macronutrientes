<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSport Pro | Rutina Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .seccion-card { @apply bg-gray-800 p-4 rounded-2xl border-l-4 transition-all mb-3 flex justify-between items-center shadow-lg; }
        .tab-btn { @apply px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-wider transition whitespace-nowrap bg-gray-800 text-gray-400; }
        .active-tab { @apply bg-emerald-600 text-white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-20">

    <div id="paywall" class="hidden fixed inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-6 text-center">
        <i class="fas fa-lock text-6xl text-emerald-500 mb-6"></i>
        <h2 class="text-3xl font-black mb-2 text-white">ACCESO EXPIRADO</h2>
        <p class="text-gray-400 mb-8">Tus 15 días de prueba han finalizado.</p>
        <button class="bg-emerald-600 px-8 py-4 rounded-full font-black uppercase tracking-widest text-white">Renovar Plan</button>
    </div>

    <main id="app-content" class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black text-emerald-500 italic uppercase">NutriSport <span class="text-white">Elite</span></h1>
            <p id="trial-counter" class="text-[9px] text-gray-500 font-bold tracking-widest uppercase"></p>
        </header>

        <section class="bg-gray-800 p-5 rounded-3xl border border-gray-700 mb-6 shadow-xl">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="peso" placeholder="Peso (kg)" oninput="recalcularNutricion()" class="bg-gray-900 border border-gray-700 rounded-xl p-3 outline-none text-sm text-center font-bold text-white">
                <select id="objetivo" onchange="recalcularNutricion()" class="bg-gray-900 border border-gray-700 rounded-xl p-3 outline-none text-sm font-bold text-white">
                    <option value="perder">Perder Grasa</option>
                    <option value="mantener">Mantenerse</option>
                    <option value="ganar">Subir Músculo</option>
                </select>
            </div>
            <div id="nutrition-panel" class="grid grid-cols-4 gap-2 text-center bg-emerald-900/10 p-3 rounded-2xl border border-emerald-500/20">
                <div><p class="text-[8px] text-emerald-500 font-bold uppercase">Prot</p><p id="p-val" class="text-sm font-black">0g</p></div>
                <div><p class="text-[8px] text-emerald-500 font-bold uppercase">Carb</p><p id="c-val" class="text-sm font-black text-yellow-500">0g</p></div>
                <div><p class="text-[8px] text-emerald-500 font-bold uppercase">Gras</p><p id="g-val" class="text-sm font-black">0g</p></div>
                <div class="border-l border-emerald-500/20"><p class="text-[8px] text-emerald-500 font-bold uppercase">Kcal</p><p id="kcal-val" class="text-sm font-black text-emerald-400">0</p></div>
            </div>
        </section>

        <div class="flex overflow-x-auto space-x-2 mb-6 pb-2 no-scrollbar">
            <button onclick="cambiarTab('brazos', this)" class="tab-btn active-tab">💪 Brazos</button>
            <button onclick="cambiarTab('piernas', this)" class="tab-btn">🦵 Piernas</button>
            <button onclick="cambiarTab('core', this)" class="tab-btn">🛡️ Core/Abdo</button>
            <button onclick="cambiarTab('cardio', this)" class="tab-btn">⚡ Cardio</button>
            <button onclick="cambiarTab('bienestar', this)" class="tab-btn">🧘 Relax/Yoga</button>
        </div>

        <div id="content-list" class="space-y-3">
            </div>
    </main>

    <script>
        const database = {
            brazos: { color: "border-blue-500", items: [
                { n: "Flexiones de Pecho", t: "3 x 15", d: "Pecho y Tríceps (Push-ups)" },
                { n: "Curl de Bíceps", t: "4 x 12", d: "Pesas o Bandas" },
                { n: "Fondos de Tríceps", t: "3 x 12", d: "En banco o silla" },
                { n: "Press Militar", t: "4 x 10", d: "Hombros - Pesas o Barra" }
            ]},
            piernas: { color: "border-emerald-500", items: [
                { n: "Sentadillas Profundas", t: "4 x 15", d: "Glúteos y Cuádriceps" },
                { n: "Zancadas (Lunges)", t: "3 x 12", d: "Equilibrio y potencia" },
                { n: "Peso Muerto Rumano", t: "4 x 10", d: "Isquiotibiales - Barra" },
                { n: "Elevación de Talón", t: "4 x 20", d: "Gemelos" }
            ]},
            core: { color: "border-yellow-500", items: [
                { n: "Plancha Abdominal", t: "3 x 60s", d: "Resistencia isométrica" },
                { n: "Crunch Abdominal", t: "3 x 20", d: "Abdomen superior" },
                { n: "Elevación de Piernas", t: "3 x 15", d: "Abdomen inferior" },
                { n: "Plancha Lateral", t: "30s /lado", d: "Oblicuos" }
            ]},
            cardio: { color: "border-orange-500", items: [
                { n: "Jumping Jacks", t: "3 x 1 min", d: "Coordinación y quema de grasa" },
                { n: "Mountain Climbers", t: "3 x 45s", d: "Ejercicios de corredores (Escaladores)" },
                { n: "Burpees", t: "3 x 10", d: "Potencia total" },
                { n: "Skipping Alto", t: "4 x 30s", d: "Cardio explosivo" }
            ]},
            bienestar: { color: "border-purple-500", items: [
                { n: "Saludo al Sol", t: "5 min", d: "Yoga - Movilidad" },
                { n: "Estiramiento Isquios", t: "2 min", d: "Relajación muscular" },
                { n: "Respiración 4-7-8", t: "5 min", d: "Control de estrés" }
            ]}
        };

        function recalcularNutricion() {
            const peso = parseFloat(document.getElementById('peso').value);
            const obj = document.getElementById('objetivo').value;
            if (!peso) return;
            let mCarb = obj === 'ganar' ? 4.5 : (obj === 'perder' ? 2 : 3.2);
            let p = peso * 2, c = peso * mCarb, g = peso * 0.8;
            document.getElementById('p-val').innerText = Math.round(p) + "g";
            document.getElementById('c-val').innerText = Math.round(c) + "g";
            document.getElementById('g-val').innerText = Math.round(g) + "g";
            document.getElementById('kcal-val').innerText = Math.round((p*4)+(c*4)+(g*9));
        }

        function cambiarTab(key, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            btn.classList.add('active-tab');
            const section = database[key];
            const list = document.getElementById('content-list');
            list.innerHTML = "";
            section.items.forEach(item => {
                list.innerHTML += `
                    <div class="seccion-card ${section.color} animate-fade-in">
                        <div>
                            <h4 class="font-bold text-white text-xs uppercase">${item.n}</h4>
                            <p class="text-[9px] text-gray-500 font-bold">${item.d}</p>
                        </div>
                        <div class="text-emerald-500 font-black text-[10px] bg-black/40 px-3 py-2 rounded-xl border border-gray-700">${item.t}</div>
                    </div>`;
            });
        }

        window.onload = () => {
            let inicio = localStorage.getItem('reg_date_new');
            if (!inicio) { inicio = new Date().getTime(); localStorage.setItem('reg_date_new', inicio); }
            let resto = 15 - Math.floor((new Date().getTime() - inicio) / 86400000);
            if (resto <= 0) {
                document.getElementById('paywall').classList.remove('hidden');
                document.getElementById('app-content').classList.add('blur-lg');
            } else {
                document.getElementById('trial-counter').innerText = `Días restantes: ${resto}`;
                cambiarTab('brazos', document.querySelector('.tab-btn'));
            }
        };
    </script>
</body>
</html>
