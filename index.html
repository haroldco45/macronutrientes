<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSport Pro | Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .seccion-card { @apply bg-gray-800 p-4 rounded-2xl border-l-4 transition-all hover:scale-[1.01] mb-3 flex justify-between items-center shadow-lg; }
        .tab-btn { @apply px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-wider transition whitespace-nowrap bg-gray-800 text-gray-400 hover:bg-gray-700; }
        .active-tab { @apply bg-emerald-600 text-white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-20">

    <div id="paywall" class="hidden fixed inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-6 text-center">
        <i class="fas fa-lock text-6xl text-emerald-500 mb-6"></i>
        <h2 class="text-3xl font-black mb-2">PRUEBA DE 15 DÍAS TERMINADA</h2>
        <p class="text-gray-400 mb-8">Tu periodo de acceso gratuito ha finalizado. Suscríbete para continuar con tu alto rendimiento.</p>
        <button class="bg-emerald-600 px-8 py-4 rounded-full font-black uppercase tracking-widest hover:bg-emerald-500 transition">Renovar Suscripción</button>
    </div>

    <main id="app-content" class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black text-emerald-500 italic uppercase">NutriSport <span class="text-white">Elite</span></h1>
            <div id="trial-counter" class="text-[10px] text-gray-500 mt-1 uppercase font-bold tracking-widest"></div>
        </header>

        <div class="flex overflow-x-auto space-x-2 mb-8 pb-4 no-scrollbar">
            <button onclick="mostrar('entreno', this)" class="tab-btn active-tab">🏋️ Entreno</button>
            <button onclick="mostrar('calentamiento', this)" class="tab-btn">🔥 Calentar</button>
            <button onclick="mostrar('yoga', this)" class="tab-btn">🧘 Yoga</button>
            <button onclick="mostrar('respiracion', this)" class="tab-btn">🌬️ Respirar</button>
            <button onclick="mostrar('estiramiento', this)" class="tab-btn">📏 Estirar</button>
            <button onclick="mostrar('relajacion', this)" class="tab-btn">🌙 Relax</button>
        </div>

        <div id="main-display" class="space-y-4">
            </div>
    </main>

    <script>
        // 1. CONTROL DE SUSCRIPCIÓN INVISIBLE (15 DÍAS)
        const TRIAL_DAYS = 15;
        
        function verificarSuscripcion() {
            let fechaInicio = localStorage.getItem('fecha_registro');
            
            if (!fechaInicio) {
                fechaInicio = new Date().getTime();
                localStorage.setItem('fecha_registro', fechaInicio);
            }

            const hoy = new Date().getTime();
            const diasPasados = Math.floor((hoy - fechaInicio) / (1000 * 60 * 60 * 24));
            const diasRestantes = TRIAL_DAYS - diasPasados;

            if (diasRestantes <= 0) {
                document.getElementById('paywall').classList.remove('hidden');
                document.getElementById('app-content').classList.add('blur-md');
            } else {
                document.getElementById('trial-counter').innerText = `Días restantes de acceso: ${diasRestantes}`;
            }
        }

        // 2. BASE DE DATOS DE EJERCICIOS Y SECCIONES
        const baseDeDatos = {
            entreno: { color: "border-emerald-500", items: [
                { n: "Press de Banca (Pesas)", t: "12 reps", d: "Fuerza de empuje" },
                { n: "Dominadas (Barra)", t: "Al fallo", d: "Fuerza de tracción" },
                { n: "Sentadilla (Barra)", t: "10 reps", d: "Potencia de piernas" }
            ]},
            calentamiento: { color: "border-orange-500", items: [
                { n: "Salto de Cuerda", t: "3 min", d: "Activación cardíaca" },
                { n: "Rotación Articular", t: "5 min", d: "Lubricación hombros/cadera" }
            ]},
            yoga: { color: "border-purple-500", items: [
                { n: "Saludo al Sol", t: "5 vueltas", d: "Flexibilidad dinámica" },
                { n: "Postura del Cuervo", t: "30 seg", d: "Equilibrio y brazos" }
            ]},
            respiracion: { color: "border-blue-400", items: [
                { n: "Método Wim Hof", t: "3 rondas", d: "Oxigenación profunda" },
                { n: "Respiración Alterna", t: "5 min", d: "Balance hemisferios" }
            ]},
            estiramiento: { color: "border-yellow-500", items: [
                { n: "Isquiotibiales", t: "1 min", d: "Con banda elástica" },
                { n: "Apertura Pectoral", t: "1 min", d: "En pared" }
            ]},
            relajacion: { color: "border-indigo-600", items: [
                { n: "Meditación Guiada", t: "10 min", d: "Frecuencia 432Hz" },
                { n: "Relajación de Jacobson", t: "15 min", d: "Tensión-distensión" }
            ]}
        };

        // 3. LÓGICA DE INTERFAZ
        function mostrar(seccion, btn) {
            // Actualizar botones
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            btn.classList.add('active-tab');

            // Cargar contenido
            const content = baseDeDatos[seccion];
            const display = document.getElementById('main-display');
            display.innerHTML = "";

            content.items.forEach(item => {
                display.innerHTML += `
                    <div class="seccion-card ${content.color} animate-fade-in">
                        <div>
                            <h4 class="font-bold text-white text-sm uppercase">${item.n}</h4>
                            <p class="text-[10px] text-gray-500">${item.d}</p>
                        </div>
                        <div class="text-emerald-500 font-black text-xs bg-black/30 px-3 py-2 rounded-xl border border-gray-700">
                            ${item.t}
                        </div>
                    </div>
                `;
            });
        }

        // Ejecutar al cargar
        window.onload = () => {
            verificarSuscripcion();
            mostrar('entreno', document.querySelector('.tab-btn')); // Carga inicial
        };
    </script>
</body>
</html>
