<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBRAS POSITIVAS | Entrenador Personalizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .seccion-card { @apply bg-gray-800 p-4 rounded-2xl border-l-4 transition-all mb-3 flex justify-between items-center shadow-lg hover:bg-gray-750; }
        .tab-btn { @apply px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-wider transition whitespace-nowrap bg-gray-800 text-gray-400 border border-gray-700; }
        .active-tab { @apply bg-emerald-500 text-black border-emerald-500 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .logo-anim { animation: pulse-green 3s infinite; }
    </style>
</head>
<body class="bg-black text-gray-100 font-sans pb-24">

    <div id="paywall" class="hidden fixed inset-0 bg-black/98 z-[100] flex flex-col items-center justify-center p-6 text-center">
        <i class="fas fa-crown text-6xl text-yellow-500 mb-6"></i>
        <h2 class="text-3xl font-black mb-2 text-white italic">VIBRAS POSITIVAS</h2>
        <p class="text-gray-400 mb-8 max-w-xs">Tu periodo de entrenamiento personalizado de 15 días ha finalizado. ¡Renueva para seguir con toda!</p>
        <button class="bg-yellow-500 text-black px-10 py-4 rounded-full font-black uppercase tracking-widest shadow-[0_0_20px_rgba(234,179,8,0.4)]">Suscribirse Ahora</button>
    </div>

    <main id="app-content" class="max-w-2xl mx-auto p-4 md:p-6">
        <header class="text-center mb-6 pt-4">
            <h1 class="text-3xl font-black text-emerald-500 italic tracking-tighter logo-anim uppercase">VIBRAS POSITIVAS</h1>
            <p class="text-[10px] text-white font-bold tracking-[0.2em] uppercase opacity-80">Entrenador Deportivo Personalizado</p>
            <div id="status-hoy" class="text-[9px] bg-emerald-500/10 text-emerald-400 py-1 px-4 rounded-full inline-block mt-3 font-black border border-emerald-500/20 uppercase"></div>
        </header>

        <section class="bg-gray-900 p-5 rounded-[2.5rem] border border-gray-800 mb-6 shadow-2xl">
            <div class="grid grid-cols-2 gap-3 mb-5">
                <div class="relative">
                    <span class="absolute top-2 left-3 text-[8px] font-bold text-emerald-500 uppercase italic">Tu Peso</span>
                    <input type="number" id="peso" placeholder="00 kg" oninput="recalcular()" class="w-full bg-black border border-gray-700 rounded-2xl p-4 pt-6 outline-none text-xl font-black text-center text-white focus:border-emerald-500 transition">
                </div>
                <div class="relative">
                    <span class="absolute top-2 left-3 text-[8px] font-bold text-emerald-500 uppercase italic">Tu Meta</span>
                    <select id="objetivo" onchange="recalcular()" class="w-full bg-black border border-gray-700 rounded-2xl p-4 pt-6 outline-none text-xs font-black text-white appearance-none uppercase">
                        <option value="perder">Quemar Grasa</option>
                        <option value="mantener" selected>Mantenerse</option>
                        <option value="ganar">Subir Músculo</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-4 gap-2 text-center mb-4">
                <div class="bg-black/50 p-2 rounded-xl border border-gray-800"><p class="text-[7px] text-gray-500 font-bold uppercase">Prot</p><p id="p-val" class="font-bold text-sm text-white">0g</p></div>
                <div class="bg-black/50 p-2 rounded-xl border border-gray-800"><p class="text-[7px] text-gray-500 font-bold uppercase">Carb</p><p id="c-val" class="font-bold text-sm text-yellow-500">0g</p></div>
                <div class="bg-black/50 p-2 rounded-xl border border-gray-800"><p class="text-[7px] text-gray-500 font-bold uppercase">Gras</p><p id="g-val" class="font-black text-sm text-white">0g</p></div>
                <div class="bg-emerald-500/10 p-2 rounded-xl border border-emerald-500/20"><p class="text-[7px] text-emerald-500 font-bold uppercase">Kcal</p><p id="kcal-val" class="font-black text-emerald-500 text-sm">0</p></div>
            </div>

            <button onclick="compartirWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 transition shadow-lg">
                <i class="fab fa-whatsapp text-lg"></i> Enviar Rutina de Hoy
            </button>
        </section>

        <div class="flex overflow-x-auto space-x-2 mb-6 pb-2 no-scrollbar">
            <button id="btn-hoy" onclick="tab('auto', this)" class="tab-btn active-tab">⭐ Hoy</button>
            <button onclick="tab('tren_superior', this)" class="tab-btn">💥 Superior</button>
            <button onclick="tab('tren_inferior', this)" class="tab-btn">🦵 Inferior</button>
            <button onclick="tab('funcional', this)" class="tab-btn">🔥 HIIT</button>
            <button onclick="tab('maquinas', this)" class="tab-btn">⚙️ Máquinas</button>
        </div>

        <div id="content-list" class="space-y-3 pb-10"></div>
    </main>

    <script>
        const gimnasioDB = {
            tren_superior: { n: "Superior", color: "border-blue-500", items: [
                { n: "Press de Banca", t: "4x10", d: "Pecho - Barra" },
                { n: "Dominadas", t: "3xMAX", d: "Espalda - Barra fija" },
                { n: "Press Militar", t: "4x12", d: "Hombros - Mancuernas" },
                { n: "Flexiones Diamante", t: "3x20", d: "Tríceps - Suelo" },
                { n: "Curl Martillo", t: "3x15", d: "Bíceps - Mancuernas" }
            ]},
            tren_inferior: { n: "Inferior", color: "border-emerald-500", items: [
                { n: "Sentadilla Libre", t: "4x12", d: "Cuádriceps - Rack" },
                { n: "Peso Muerto", t: "3x8", d: "Isquios - Barra" },
                { n: "Zancadas", t: "3x20m", d: "Glúteos - Mancuernas" },
                { n: "Hip Thrust", t: "4x10", d: "Glúteos - Barra" },
                { n: "Elevación Gemelos", t: "4x25", d: "Pantorrillas" }
            ]},
            funcional: { n: "HIIT", color: "border-orange-600", items: [
                { n: "Jumping Jacks", t: "3x1 min", d: "Cardio Total" },
                { n: "Mountain Climbers", t: "4x45s", d: "Corredores - Core" },
                { n: "Burpees", t: "3x15", d: "Potencia Explosiva" },
                { n: "Plancha Abdominal", t: "3x1 min", d: "Core Isométrico" }
            ]},
            maquinas: { n: "Máquinas", color: "border-yellow-600", items: [
                { n: "Prensa 45°", t: "4x15", d: "Piernas - Máquina" },
                { n: "Polea al Pecho", t: "4x12", d: "Espalda - Cables" },
                { n: "Extensiones", t: "3x15", d: "Cuádriceps - Palanca" },
                { n: "Remo Gironda", t: "4x10", d: "Espalda - Polea Baja" }
            ]}
        };

        const diasProgramados = ['funcional', 'tren_superior', 'tren_inferior', 'funcional', 'tren_superior', 'tren_inferior', 'maquinas'];
        let currentKey = 'tren_superior';

        function recalcular() {
            const peso = parseFloat(document.getElementById('peso').value) || 70;
